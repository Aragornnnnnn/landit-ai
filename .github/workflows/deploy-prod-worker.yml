name: Deploy prod worker

on:
  workflow_dispatch:
    inputs:
      version:
        description: '배포 버전. 예시 1.2.0'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: prod-worker-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: ${{ vars.PROD_AWS_ROLE_ARN || secrets.PROD_AWS_ROLE_ARN }}
  ECR_REPOSITORY: ${{ vars.PROD_WORKER_ECR_REPOSITORY }}
  ECR_IMAGE_URI: ${{ vars.PROD_WORKER_ECR_IMAGE_URI }}
  ECS_CLUSTER: ${{ vars.PROD_WORKER_ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.PROD_WORKER_ECS_SERVICE }}

jobs:
  deploy:
    name: Build and deploy prod worker
    runs-on: ubuntu-latest

    steps:
      - name: Validate main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production deploy must run from main branch"
            exit 1
          fi

      - name: Validate deployment settings
        run: |
          test -n "$AWS_ROLE_ARN"
          test -n "$ECR_REPOSITORY"
          test -n "$ECR_IMAGE_URI"
          test -n "$ECS_CLUSTER"
          test -n "$ECS_SERVICE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use MAJOR.MINOR.PATCH format"
            exit 1
          fi

          release_tag="ai-v$RELEASE_VERSION"
          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
            echo "$release_tag already exists"
            exit 1
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --build-arg "APP_VERSION=${GITHUB_SHA}" \
            -t "$ECR_IMAGE_URI:${GITHUB_SHA}" \
            -t "$ECR_IMAGE_URI:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "$ECR_IMAGE_URI:${GITHUB_SHA}"
          docker push "$ECR_IMAGE_URI:latest"

      - name: Force ECS service deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --query 'service.{serviceName:serviceName,status:status,desiredCount:desiredCount,runningCount:runningCount}' \
            --output json

      - name: Verify ECS service
        timeout-minutes: 12
        run: |
          desired_count="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].desiredCount' \
            --output text)"

          if [ "$desired_count" = "None" ] || [ "$desired_count" = "null" ]; then
            echo "ECS service not found"
            exit 1
          fi

          print_service_state() {
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].{serviceName:serviceName,status:status,desiredCount:desiredCount,runningCount:runningCount,pendingCount:pendingCount,deployments:deployments[*].{status:status,rolloutState:rolloutState,desiredCount:desiredCount,runningCount:runningCount,pendingCount:pendingCount,failedTasks:failedTasks}}' \
              --output json
          }

          print_service_events() {
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].events[0:10].[createdAt,message]' \
              --output table
          }

          print_service_state

          if [ "$desired_count" -gt 0 ]; then
            for attempt in $(seq 1 40); do
              rollout_state="$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --query 'services[0].deployments[?status==`PRIMARY`][0].rolloutState' \
                --output text)"
              deployment_count="$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --query 'length(services[0].deployments)' \
                --output text)"
              running_count="$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --query 'services[0].runningCount' \
                --output text)"

              print_service_state

              if [ "$rollout_state" = "FAILED" ]; then
                echo "PRIMARY ECS deployment failed"
                print_service_events
                exit 1
              fi

              if [ "$deployment_count" -eq 1 ] && [ "$running_count" -eq "$desired_count" ]; then
                echo "ECS service is stable"
                break
              fi

              if [ "$attempt" -eq 40 ]; then
                echo "ECS service did not become stable within 10 minutes"
                print_service_events
                exit 1
              fi

              sleep 15
            done
          else
            echo "desired count is 0; skipping services-stable wait"
          fi

      - name: Publish Git tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "$RELEASE_TAG 프로덕션 배포"
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
